<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车道检测测试</title>
    <style>
        body { font-family: sans-serif; margin: 16px; background: #f5f5f5; }
        .panel { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        img { max-width: 100%; max-height: 70vh; display: block; background: #000; }
        .stats { color: #333; line-height: 1.8; }
        .hint { color: #666; font-size: 14px; }
        button { margin-right: 8px; padding: 8px 16px; cursor: pointer; }
        input { margin-right: 8px; }
        .error { color: #c0392b; }
        .result-list { margin-top: 8px; font-size: 14px; color: #444; }
        .result-list li { margin: 4px 0; }
        pre.json { background: #f0f2f5; padding: 12px; border-radius: 6px; overflow: auto; max-height: 240px; font-size: 12px; }
    </style>
</head>
<body>
<h2>车道检测测试（/lineVideoDetected）</h2>

<div class="panel">
    <div>
        <input type="file" id="videoFile" accept="video/*">
        <label>跳帧 frame_interval：</label>
        <input type="number" id="frameInterval" value="1" min="1" max="30" style="width: 50px;" title="建议 1 逐帧检测">
        <button id="startBtn">开始 NDJSON 流式检测</button>
        <button id="stopBtn" disabled>停止</button>
    </div>
    <p class="hint">
        请通过 <a href="http://127.0.0.1:8000/line_detected.html" target="_blank">http://127.0.0.1:8000/line_detected.html</a> 打开本页（不要双击本地 html 文件）。<br>
        选择视频后点「开始」，消费 POST <code>/lineVideoDetected</code> 的 NDJSON 流。<br>
        逐帧进行车道线检测（Canny + Hough）与 YOLO 车辆检测叠加，输出固定 1280×720 标注视频。<br>
        默认 <code>frame_interval=1</code>；任务结束后展示汇总统计，完整 API 响应保存在 <code>upload/detected/{uuid}/result.json</code>。
    </p>
</div>

<div class="panel">
    <img id="videoFrame" alt="车道检测结果帧">
    <div class="stats" id="stats">等待开始...</div>
    <ul class="result-list" id="vehicleList"></ul>
    <pre class="json" id="resultJson" hidden></pre>
    <div class="error" id="error"></div>
</div>

<script>
    const API_BASE = window.location.origin.startsWith('http')
        ? window.location.origin
        : 'http://127.0.0.1:8000';
    const imgEl = document.getElementById('videoFrame');
    const statsEl = document.getElementById('stats');
    const vehicleListEl = document.getElementById('vehicleList');
    const resultJsonEl = document.getElementById('resultJson');
    const errorEl = document.getElementById('error');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    let abortController = null;
    let frameCount = 0;
    let lastFrameTime = performance.now();
    let displayFps = 0;

    function setError(msg) {
        errorEl.textContent = msg || '';
    }

    function clearVehicleList() {
        vehicleListEl.innerHTML = '';
    }

    function renderVehicleList(vehicles) {
        clearVehicleList();
        if (!vehicles || !vehicles.length) {
            vehicleListEl.innerHTML = '<li>（当前帧未检测到车辆）</li>';
            return;
        }
        vehicles.forEach((item, idx) => {
            const li = document.createElement('li');
            const bbox = (item.bbox || []).join(', ');
            li.textContent =
                `#${idx + 1} ${item.class_name || 'car'} | conf ${item.confidence ?? '-'} | 距离 ${item.distance_m ?? '-'} m | bbox [${bbox}]`;
            vehicleListEl.appendChild(li);
        });
    }

    function updateStats(extra = '') {
        statsEl.textContent =
            `已显示帧数: ${frameCount} | 页面刷新 FPS: ${displayFps.toFixed(1)}` +
            (extra ? ` | ${extra}` : '');
    }

    function showBase64Frame(base64, meta = '') {
        if (!base64) return;
        imgEl.src = 'data:image/jpeg;base64,' + base64;
        frameCount += 1;
        const now = performance.now();
        const dt = now - lastFrameTime;
        if (dt > 0) displayFps = 1000 / dt;
        lastFrameTime = now;
        updateStats(meta);
    }

    function stopAll() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    async function startNdjsonStream() {
        const fileInput = document.getElementById('videoFile');
        if (!fileInput.files.length) {
            setError('请先选择视频文件');
            return;
        }

        stopAll();
        setError('');
        clearVehicleList();
        resultJsonEl.hidden = true;
        resultJsonEl.textContent = '';
        frameCount = 0;
        displayFps = 0;
        lastFrameTime = performance.now();

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('frame_interval', document.getElementById('frameInterval').value);

        abortController = new AbortController();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        updateStats('连接中...');

        try {
            const response = await fetch(`${API_BASE}/lineVideoDetected`, {
                method: 'POST',
                body: formData,
                signal: abortController.signal,
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status} ${errText}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let newlineIndex;
                while ((newlineIndex = buffer.indexOf('\n')) >= 0) {
                    const line = buffer.slice(0, newlineIndex).trim();
                    buffer = buffer.slice(newlineIndex + 1);
                    if (line) handleNdjsonLine(line);
                }
            }

            if (buffer.trim()) handleNdjsonLine(buffer.trim());
        } catch (err) {
            if (err.name !== 'AbortError') {
                setError('NDJSON 流异常: ' + err.message);
            }
        } finally {
            stopAll();
        }
    }

    function handleNdjsonLine(line) {
        let payload;
        try {
            payload = JSON.parse(line);
        } catch (e) {
            return;
        }

        const event = payload.event;
        const data = payload.data || {};

        if (event === 'start') {
            updateStats(
                `任务 ${data.session_id} | 源 ${data.source_width}×${data.source_height} | 输出 ${data.output_width}×${data.output_height} | 总帧 ${data.total_frames} | fps ${data.fps} | 跳帧 ${data.frame_interval}`
            );
            return;
        }

        if (event === 'frame') {
            const base64 = data.frame_jpeg_base64;
            const laneTag = data.lane_detected ? '车道已识别' : '车道未识别';
            const detectTag = data.detected ? '推理帧' : '跳过帧';
            renderVehicleList(data.vehicles || []);
            showBase64Frame(
                base64,
                `后端帧 ${data.frame_index} | ${laneTag} | 车辆 ${data.vehicle_count} | ${detectTag}`
            );
            return;
        }

        if (event === 'done') {
            clearVehicleList();
            vehicleListEl.innerHTML =
                `<li>处理帧数: ${data.processed_frames ?? '-'}</li>` +
                `<li>含车道帧: ${data.frames_with_lane ?? '-'}</li>` +
                `<li>含车辆帧: ${data.frames_with_vehicle ?? '-'}</li>` +
                `<li>车辆检测总数: ${data.vehicle_count_total ?? '-'}</li>`;
            updateStats(
                `完成 | 输出 ${data.url || ''} | JSON ${data.result_json || ''}`
            );
            resultJsonEl.hidden = false;
            resultJsonEl.textContent = JSON.stringify(payload, null, 2);
            return;
        }

        if (event === 'error') {
            setError(payload.msg || '检测失败');
        }
    }

    startBtn.addEventListener('click', startNdjsonStream);
    stopBtn.addEventListener('click', stopAll);
</script>
</body>
</html>
