<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO 实时检测帧测试</title>
    <style>
        body { font-family: sans-serif; margin: 16px; background: #f5f5f5; }
        .panel { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        img { max-width: 100%; max-height: 70vh; display: block; background: #000; }
        .stats { color: #333; line-height: 1.8; }
        .hint { color: #666; font-size: 14px; }
        button { margin-right: 8px; padding: 8px 16px; cursor: pointer; }
        input, select { margin-right: 8px; }
        .error { color: #c0392b; }
    </style>
</head>
<body>
<h2>YOLO 实时检测帧测试</h2>

<div class="panel">
    <div>
        <input type="file" id="videoFile" accept="video/*">
        <select id="className">
            <option value="car">car</option>
            <option value="person">person</option>
            <option value="all">all</option>
        </select>
        <select id="modelType">
            <option value="yolov8n">yolov8n</option>
            <option value="yolov8s">yolov8s</option>
        </select>
        <input type="number" id="frameInterval" value="5" min="1" max="30" style="width: 60px;" title="frame_interval">
        <button id="startBtn">开始 NDJSON 流式检测</button>
        <button id="stopBtn" disabled>停止</button>
    </div>
    <p class="hint">
        请通过 <a href="http://127.0.0.1:8000/yolov8_detected.html" target="_blank">http://127.0.0.1:8000/yolov8_detected.html</a> 打开本页（不要双击本地 html 文件）。<br>
        方式一（推荐）：选择视频后点「开始」，直接消费 POST /yoloVideoDetectedWithFrame 的 NDJSON 流。<br>
        方式二：若已用 curl 启动任务，在 URL 加 <code>?task_id=你的session_id</code>，页面将轮询 /getYoloLatestFrame。
    </p>
</div>

<div class="panel">
    <img id="videoFrame" alt="检测结果帧">
    <div class="stats" id="stats">等待开始...</div>
    <div class="error" id="error"></div>
</div>

<script>
    // 从后端同源打开时用当前 origin，避免 file:// 跨域 Failed to fetch
    const API_BASE = window.location.origin.startsWith('http')
        ? window.location.origin
        : 'http://127.0.0.1:8000';
    const imgEl = document.getElementById('videoFrame');
    const statsEl = document.getElementById('stats');
    const errorEl = document.getElementById('error');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    let abortController = null;
    let pollTimer = null;
    let frameCount = 0;
    let lastFrameTime = performance.now();
    let displayFps = 0;

    function setError(msg) {
        errorEl.textContent = msg || '';
    }

    function updateStats(extra = '') {
        statsEl.textContent =
            `已显示帧数: ${frameCount} | 页面刷新 FPS: ${displayFps.toFixed(1)}` +
            (extra ? ` | ${extra}` : '');
    }

    function showBase64Frame(base64, meta = '') {
        if (!base64) return;
        imgEl.src = 'data:image/jpeg;base64,' + base64;
        frameCount += 1;
        const now = performance.now();
        const dt = now - lastFrameTime;
        if (dt > 0) displayFps = 1000 / dt;
        lastFrameTime = now;
        updateStats(meta);
    }

    function stopAll() {
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
        if (pollTimer) {
            clearTimeout(pollTimer);
            pollTimer = null;
        }
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    async function startNdjsonStream() {
        const fileInput = document.getElementById('videoFile');
        if (!fileInput.files.length) {
            setError('请先选择视频文件');
            return;
        }

        stopAll();
        setError('');
        frameCount = 0;
        displayFps = 0;
        lastFrameTime = performance.now();

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('class_name', document.getElementById('className').value);
        formData.append('model_type', document.getElementById('modelType').value);
        formData.append('frame_interval', document.getElementById('frameInterval').value);

        abortController = new AbortController();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        updateStats('连接中...');

        try {
            const response = await fetch(`${API_BASE}/yoloVideoDetectedWithFrame`, {
                method: 'POST',
                body: formData,
                signal: abortController.signal,
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                let newlineIndex;
                while ((newlineIndex = buffer.indexOf('\n')) >= 0) {
                    const line = buffer.slice(0, newlineIndex).trim();
                    buffer = buffer.slice(newlineIndex + 1);
                    if (line) handleNdjsonLine(line);
                }
            }

            if (buffer.trim()) handleNdjsonLine(buffer.trim());
        } catch (err) {
            if (err.name !== 'AbortError') {
                setError('NDJSON 流异常: ' + err.message);
            }
        } finally {
            stopAll();
        }
    }

    function handleNdjsonLine(line) {
        let payload;
        try {
            payload = JSON.parse(line);
        } catch (e) {
            return;
        }

        const event = payload.event;
        const data = payload.data || {};

        if (event === 'start') {
            updateStats(`任务 ${data.session_id} | 总帧 ${data.total_frames} | fps ${data.fps}`);
            return;
        }

        if (event === 'frame') {
            const base64 = data.frame_jpeg_base64;
            showBase64Frame(base64, `后端帧序号 ${data.frame_index}`);
            return;
        }

        if (event === 'done') {
            updateStats(`完成 | 累计检测 ${data.numbers} | 输出 ${data.url || ''}`);
            return;
        }

        if (event === 'error') {
            setError(payload.msg || '检测失败');
        }
    }

    function startPollMode(taskId) {
        stopAll();
        setError('');
        frameCount = 0;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        updateStats(`轮询 task_id=${taskId}`);

        async function poll() {
            try {
                const response = await fetch(
                    `${API_BASE}/getYoloLatestFrame?task_id=${encodeURIComponent(taskId)}`
                );
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                if (data.frame) {
                    showBase64Frame(data.frame, 'poll 模式');
                }
            } catch (err) {
                setError('轮询失败: ' + err.message);
                stopAll();
                return;
            }
            pollTimer = setTimeout(poll, 33);
        }

        poll();
    }

    startBtn.addEventListener('click', startNdjsonStream);
    stopBtn.addEventListener('click', stopAll);

    const params = new URLSearchParams(window.location.search);
    const taskIdFromUrl = params.get('task_id');
    if (taskIdFromUrl) {
        startPollMode(taskIdFromUrl);
    }
</script>
</body>
</html>
